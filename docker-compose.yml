version: '3.8'

services:
  app:
    build: .
    ports:
      - ":80"
    environment:
      # Koneksi database menunjuk ke container 'db'
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      # Nama database utama
      - DB_NAME=uas_06
    restart: always

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - ":3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-import database terpadu
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  db_data:
